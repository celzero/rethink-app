name: 📺 Android TV Release

# rethink-tv fork: builds a signed `fdroidTvRelease` APK and publishes
# it as a GitHub Release. Triggered automatically when a tag matching
# `v*-tv` or `tv-v*` is pushed, and on-demand via `workflow_dispatch`
# (the latter is used to dry-run the release build path without
# secrets — produces an UNSIGNED APK uploaded as a workflow artifact
# only, no GitHub Release is created).
#
# Required repository secrets (configure under Settings → Secrets and
# variables → Actions). See `docs/release.md` in this repo for the
# keystore-generation procedure that produces these values.
#
#   TV_RELEASE_KS_BASE64           base64 of the JKS keystore file
#   TV_RELEASE_KS_ALIAS            key alias inside the keystore
#   TV_RELEASE_KS_PASSPHRASE       key passphrase
#   TV_RELEASE_KS_STORE_PASSPHRASE keystore passphrase
#
# When these are missing, the workflow still runs but the produced APK
# is unsigned and no GitHub Release is created.

on:
  push:
    tags:
      - 'v*-tv'
      - 'tv-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no GitHub Release, even if a tag is pushed manually)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-tv-release:
    runs-on: ubuntu-latest
    env:
      VARIANT: assembleFdroidTvRelease
    steps:
      - name: 🥏 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so `git describe --tags` works

      - name: ☕️ JDKv17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: ⚡️ +x gradlew
        run: chmod +x gradlew

      - name: 🔐 Materialize keystore from secrets (if provided)
        id: keystore
        env:
          KS_B64: ${{ secrets.TV_RELEASE_KS_BASE64 }}
        run: |
          if [ -n "${KS_B64}" ]; then
            echo "${KS_B64}" | base64 --decode > "${RUNNER_TEMP}/tv-release.jks"
            echo "ks_file=${RUNNER_TEMP}/tv-release.jks" >> "${GITHUB_OUTPUT}"
            echo "signed=true" >> "${GITHUB_OUTPUT}"
            echo "::notice::TV release keystore materialized; APK will be signed."
          else
            echo "ks_file=" >> "${GITHUB_OUTPUT}"
            echo "signed=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::TV_RELEASE_KS_BASE64 secret is not set; APK will be UNSIGNED."
          fi

      - name: 🚂 Assemble signed TV release
        env:
          TV_RELEASE_KS_FILE: ${{ steps.keystore.outputs.ks_file }}
          TV_RELEASE_KS_ALIAS: ${{ secrets.TV_RELEASE_KS_ALIAS }}
          TV_RELEASE_KS_PASSPHRASE: ${{ secrets.TV_RELEASE_KS_PASSPHRASE }}
          TV_RELEASE_KS_STORE_PASSPHRASE: ${{ secrets.TV_RELEASE_KS_STORE_PASSPHRASE }}
        run: |
          ./gradlew \
            ${VARIANT} \
            --info \
            --stacktrace \
            --warning-mode all

      - name: 📦 Upload release APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rethink-tv-fdroid-release-${{ github.ref_name }}
          path: app/build/outputs/apk/fdroidTv/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 🚀 Publish GitHub Release
        if: |
          startsWith(github.ref, 'refs/tags/') &&
          steps.keystore.outputs.signed == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/fdroidTv/release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-scaffold') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

      - name: 🧾 Release-step summary
        if: always()
        run: |
          {
            echo "## Release build summary"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| variant | \`${VARIANT}\` |"
            echo "| tag | \`${GITHUB_REF_NAME}\` |"
            echo "| signed | \`${{ steps.keystore.outputs.signed }}\` |"
            echo "| github release | \`${{ startsWith(github.ref, 'refs/tags/') && steps.keystore.outputs.signed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false) }}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
